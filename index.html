const authSignUp = async (email, password) => {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
    method: "POST",
    headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ email, password }),
  });
  return res.json();
};

const authSignIn = async (email, password) => {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: "POST",
    headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ email, password }),
  });
  return res.json();
};

const authSignOut = async (token) => {
  await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
    method: "POST",
    headers: getHeaders(token),
  });
};

const authRefresh = async (refreshToken) => {

    method: "POST",
    headers: { "apikey": SUPABASE_ANON_KEY, "Content-Type": "application/json" },

// セッション保存
const SESSION_KEY = "kj_session";
const saveSession = (session) => {
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch {}
};
const loadSession = () => {
  try { const s = localStorage.getItem(SESSION_KEY); return s ? JSON.parse(s) : null; } catch { return null; }
};
const clearSession = () => {

// ── 招待コード確認 ────────────────────────────────────────────────────────────

const checkInvitationCode = async (code) => {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/invitation_codes?code=eq.${encodeURIComponent(code)}&used=eq.false&select=id,code`,
    { headers: getHeaders(null) }
  );
  const rows = await res.json();
  return rows && rows.length > 0 ? rows[0] : null;
};

const markCodeUsed = async (codeId, userId, token) => {
  await fetch(
    `${SUPABASE_URL}/rest/v1/invitation_codes?id=eq.${codeId}`,
    {
      method: "PATCH",
      headers: { ...getHeaders(token), "Prefer": "return=minimal" },
      body: JSON.stringify({ used: true, used_by: userId, used_at: new Date().toISOString() }),
    }
  );
};

      return rows[0].data;
    }
  } catch(e) { console.error("load error:", e); }

const saveToSupabase = async (token, userId, projects, activeProjectId) => {
  // まず既存行があるか確認
  const checkRes = await fetch(
    `${SUPABASE_URL}/rest/v1/knitting_data?user_id=eq.${userId}&select=id`,
    { headers: getHeaders(token) }
  );
  const existing = await checkRes.json();

  const payload = {
    data: { projects, activeProjectId },
    updated_at: new Date().toISOString(),
  };

  if (existing && existing.length > 0) {
    // 既存行をUPDATE
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/knitting_data?user_id=eq.${userId}`,
      {
        method: "PATCH",
        headers: { ...getHeaders(token), "Prefer": "return=minimal" },
        body: JSON.stringify(payload),
      }
    );
    return res.ok;
  } else {
    // 新規INSERT
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/knitting_data`,
      {
        method: "POST",
        headers: { ...getHeaders(token), "Prefer": "return=minimal" },
        body: JSON.stringify({ ...payload, user_id: userId }),
      }
    );
    return res.ok;
  }
};

// ── Storage helpers ───────────────────────────────────────────────────────────

const BUCKET = "knitting-charts";

const uploadChart = async (token, projectId, file) => {
  const ext = file.name.split(".").pop();
  const path = `${projectId}/${Date.now()}.${ext}`;
  const res = await fetch(
    `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`,
    {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${token}`,
        "Content-Type": file.type,
      },
      body: file,
    }
  );
  if (!res.ok) throw new Error("Upload failed");
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
};

const deleteChart = async (token, url) => {
  const path = url.split(`/object/public/${BUCKET}/`)[1];
  if (!path) return;
  await fetch(
    `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`,
    {
      method: "DELETE",
      headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${token}` },
    }
  );
};

const uploadAnnotation = async (token, projectId, chartIdx, base64DataUrl) => {
  const path = `${projectId}/annotation_${chartIdx}_${Date.now()}.png`;
  const res2 = await fetch(base64DataUrl);
  const blob = await res2.blob();
  const uploadRes = await fetch(
    `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`,
    {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${token}`,
        "Content-Type": "image/png",
      },
      body: blob,
    }
  );
  if (!uploadRes.ok) throw new Error("Annotation upload failed");
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
};

const deleteAnnotation = async (token, url) => {
  if (!url || url.startsWith("data:")) return;
  const path = url.split(`/object/public/${BUCKET}/`)[1];
  if (!path || !path.includes("annotation_")) return;
  await fetch(
    `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`,
    {
      method: "DELETE",
      headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${token}` },
    }
  ).catch(() => {});
};

const C = {

// ── Auth Screen ───────────────────────────────────────────────────────────────

function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login"); // "login" | "register"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [inviteCode, setInviteCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const inputStyle = {
    width: "100%",
    background: C.bg,
    border: `1px solid ${C.border}`,
    borderRadius: 8,
    padding: "12px 14px",
    fontSize: 15,
    color: C.text,
  };

  const labelStyle = {
    display: "block",
    fontSize: 11,
    color: C.gold,
    letterSpacing: "0.1em",
    fontFamily: "sans-serif",
    textTransform: "uppercase",
    marginBottom: 6,
    marginTop: 18,
  };

  const handleLogin = async () => {
    if (!email || !password) { setError("メールアドレスとパスワードを入力してください"); return; }
    setLoading(true); setError("");
    try {
      const data = await authSignIn(email, password);
      if (data.error || !data.access_token) {
        setError("メールアドレスまたはパスワードが違います");
      } else {
        const session = { access_token: data.access_token, refresh_token: data.refresh_token, user: data.user };
        saveSession(session);
        onAuth(session);
      }
    } catch { setError("接続エラーが発生しました"); }
    setLoading(false);
  };

  const handleRegister = async () => {
    if (!email || !password || !inviteCode) { setError("すべての項目を入力してください"); return; }
    if (password.length < 6) { setError("パスワードは6文字以上にしてください"); return; }
    setLoading(true); setError("");
    try {
      // 招待コード確認
      const codeRow = await checkInvitationCode(inviteCode.trim());
      if (!codeRow) { setError("招待コードが無効または使用済みです"); setLoading(false); return; }

      // アカウント作成
      const data = await authSignUp(email, password);
      if (data.error) { setError(data.error.message || "登録に失敗しました"); setLoading(false); return; }

      // ログイン
      const loginData = await authSignIn(email, password);
      if (!loginData.access_token) { setError("登録後のログインに失敗しました"); setLoading(false); return; }

      // 招待コードを使用済みに
      await markCodeUsed(codeRow.id, loginData.user.id, loginData.access_token);

      const session = { access_token: loginData.access_token, refresh_token: loginData.refresh_token, user: loginData.user };
      saveSession(session);
      onAuth(session);
    } catch(e) { setError("エラーが発生しました: " + e.message); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "24px 20px" }}>
      <div style={{ marginBottom: 32, textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 8 }}>🧶</div>
        <div style={{ fontSize: 22, fontWeight: "bold", color: C.green, letterSpacing: "0.04em" }}>Knitting Journal</div>
      </div>

      <div style={{ width: "100%", maxWidth: 400, background: C.card, borderRadius: 16, border: `1px solid ${C.border}`, padding: "28px 24px", boxShadow: "0 4px 24px rgba(45,74,62,0.08)" }}>

        {/* タブ */}
        <div style={{ display: "flex", gap: 0, marginBottom: 24, background: C.bg, borderRadius: 10, padding: 4 }}>
          {[["login", "ログイン"], ["register", "新規登録"]].map(([m, label]) => (
            <button key={m} onClick={() => { setMode(m); setError(""); }} style={{
              flex: 1, background: mode === m ? C.green : "transparent",
              border: "none", color: mode === m ? "#F5EEDD" : C.textMid,
              borderRadius: 8, padding: "9px 0", fontSize: 14,
              fontWeight: mode === m ? "bold" : "normal",
              cursor: "pointer", fontFamily: "sans-serif", transition: "all 0.2s"
            }}>{label}</button>
          ))}
        </div>

        <label style={labelStyle}>メールアドレス</label>
        <input
          type="email"
          style={inputStyle}
          value={email}
          onChange={e => setEmail(e.target.value)}
          placeholder="example@email.com"
          autoComplete="email"
        />

        <label style={labelStyle}>パスワード</label>
        <input
          type="password"
          style={inputStyle}
          value={password}
          onChange={e => setPassword(e.target.value)}
          placeholder={mode === "register" ? "6文字以上" : "パスワード"}
          autoComplete={mode === "login" ? "current-password" : "new-password"}
        />

        {mode === "register" && (<>
          <label style={labelStyle}>招待コード</label>
          <input
            type="text"
            style={inputStyle}
            value={inviteCode}
            onChange={e => setInviteCode(e.target.value)}
            placeholder="招待コードを入力"
            autoComplete="off"
          />
        </>)}

        {error && (
          <div style={{ marginTop: 14, background: "#FDF0EE", border: `1px solid ${C.rose}`, borderRadius: 8, padding: "10px 14px", fontSize: 13, color: C.rose, fontFamily: "sans-serif" }}>
            {error}
          </div>
        )}

        <button
          onClick={mode === "login" ? handleLogin : handleRegister}
          disabled={loading}
          style={{
            width: "100%", marginTop: 24,
            background: loading ? C.textLight : C.green,
            border: "none", color: "#F5EEDD",
            borderRadius: 10, padding: "14px 0",
            fontSize: 16, fontWeight: "bold",
            cursor: loading ? "not-allowed" : "pointer",
            fontFamily: "sans-serif", letterSpacing: "0.05em",
            transition: "background 0.2s"
          }}
        >
          {loading ? "処理中…" : mode === "login" ? "ログイン" : "登録する"}
        </button>
      </div>

      <div style={{ marginTop: 20, fontSize: 12, color: C.textLight, fontFamily: "sans-serif", textAlign: "center" }}>
        新規登録には招待コードが必要です
      </div>
    </div>
  );
}

// ── Chart Viewer Component ────────────────────────────────────────────────────

function ChartViewer({ charts, projectId, onClose, onChartsChange, section, onCount, token }) {
  const [activeIdx, setActiveIdx] = useState(0);
  const [tool, setTool] = useState(null);
  const [color, setColor] = useState("#C4837A");
  const [lineWidth, setLineWidth] = useState(3);
  const [uploading, setUploading] = useState(false);
  const [markerY, setMarkerY] = useState(0.2);
  const [markerHeight, setMarkerHeight] = useState(2);
  const [showMarker, setShowMarker] = useState(true);
  const [scale, setScale] = useState(1);
  const [offset, setOffset] = useState({ x: 0, y: 0 });

  const bgCanvasRef = useRef(null);
  const drawCanvasRef = useRef(null);
  const viewportRef = useRef(null);
  const fileInputRef = useRef(null);
  const drawing = useRef(false);
  const lastPos = useRef(null);
  const saveTimer = useRef(null);
  const pinch = useRef(null);
  const panStart = useRef(null);

  const [toast, setToast] = useState(null);
  const prevSectionIdRef = useRef(null);

  useEffect(() => {
    if (!section) return;
    if (prevSectionIdRef.current && prevSectionIdRef.current !== section.id) {
      setToast(`✓ 次の工程へ：${section.name}`);
      setTimeout(() => setToast(null), 2500);
    }
    prevSectionIdRef.current = section.id;
  }, [section?.id]);

  const activeChart = charts[activeIdx];

  useEffect(() => {
    if (!activeChart || !bgCanvasRef.current) return;
    if (activeChart.url?.toLowerCase().includes(".pdf")) return;
    const bg = bgCanvasRef.current;
    const ctx = bg.getContext("2d");
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      bg.width = img.naturalWidth;
      bg.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      const dc = drawCanvasRef.current;
      if (dc) {
        dc.width = img.naturalWidth;
        dc.height = img.naturalHeight;
        if (activeChart.annotation) {
          const ann = new Image();
          ann.onload = () => { dc.getContext("2d").drawImage(ann, 0, 0); };
          ann.src = activeChart.annotation;
        }
      }
      setScale(1); setOffset({ x: 0, y: 0 });
    };
    img.src = activeChart.url;
  }, [activeIdx]);

  const getCanvasPos = (clientX, clientY) => {
    const dc = drawCanvasRef.current;
    if (!dc) return null;
    const rect = dc.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (dc.width / rect.width),
      y: (clientY - rect.top) * (dc.height / rect.height),
    };
  };

  const historyRef = useRef([]);
  const MAX_HISTORY = 20;

  const pushHistory = () => {
    const dc = drawCanvasRef.current;
    if (!dc) return;
    const snapshot = dc.getContext("2d").getImageData(0, 0, dc.width, dc.height);
    historyRef.current = [...historyRef.current.slice(-MAX_HISTORY + 1), snapshot];
  };

  const undo = () => {
    const dc = drawCanvasRef.current;
    if (!dc || historyRef.current.length === 0) return;
    const prev = historyRef.current[historyRef.current.length - 1];
    historyRef.current = historyRef.current.slice(0, -1);
    dc.getContext("2d").putImageData(prev, 0, 0);
    saveAnnotation();
  };

  const saveAnnotation = () => {
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      const dc = drawCanvasRef.current;
      if (!dc) return;
      // base64で直接保存（Storageアップロード不要・確実に動く）
      const base64 = dc.toDataURL("image/png");
      const updated = charts.map((c, i) => i === activeIdx ? { ...c, annotation: base64 } : c);
      onChartsChange(updated);
    }, 800);
  };

  const doDraw = (pos) => {
    const dc = drawCanvasRef.current;
    if (!dc || !lastPos.current) return;
    const ctx = dc.getContext("2d");
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    if (tool === "eraser") {
      ctx.globalCompositeOperation = "destination-out";
      ctx.strokeStyle = "rgba(0,0,0,1)";
      ctx.lineWidth = lineWidth * 10;
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
    }
    ctx.stroke();
    ctx.globalCompositeOperation = "source-over";
  };

  const onTouchStart = (e) => {
    if (e.touches.length === 2) {
      const t0 = e.touches[0], t1 = e.touches[1];
      pinch.current = { startDist: Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY), startScale: scale };
      drawing.current = false; return;
    }
    if (tool === "pen" || tool === "eraser") {
      e.preventDefault();
      const t = e.touches[0];
      const pos = getCanvasPos(t.clientX, t.clientY);
      if (!pos) return;
      pushHistory();
      drawing.current = true; lastPos.current = pos;
    } else {
      const t = e.touches[0];
      panStart.current = { clientX: t.clientX, clientY: t.clientY, ox: offset.x, oy: offset.y };
    }
  };

  const onTouchMove = (e) => {
    if (e.touches.length === 2 && pinch.current) {
      e.preventDefault();
      const t0 = e.touches[0], t1 = e.touches[1];
      const dist = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
      setScale(Math.max(0.5, Math.min(8, pinch.current.startScale * dist / pinch.current.startDist)));
      return;
    }
    if ((tool === "pen" || tool === "eraser") && drawing.current) {
      e.preventDefault();
      const t = e.touches[0];
      const pos = getCanvasPos(t.clientX, t.clientY);
      if (!pos) return;
      doDraw(pos); lastPos.current = pos;
    } else if (panStart.current && !tool) {
      e.preventDefault();
      const t = e.touches[0];
      setOffset({ x: panStart.current.ox + t.clientX - panStart.current.clientX, y: panStart.current.oy + t.clientY - panStart.current.clientY });
    }
  };

  const onTouchEnd = () => {
    pinch.current = null; panStart.current = null;
    if (drawing.current) { drawing.current = false; saveAnnotation(); }
  };

  const onMouseDown = (e) => {
    if (tool !== "pen" && tool !== "eraser") return;
    const pos = getCanvasPos(e.clientX, e.clientY);
    if (!pos) return;
    pushHistory();
    drawing.current = true; lastPos.current = pos;
  };
  const onMouseMove = (e) => {
    if (!drawing.current) return;
    const pos = getCanvasPos(e.clientX, e.clientY);
    if (!pos) return;
    doDraw(pos); lastPos.current = pos;
  };
  const onMouseUp = () => { if (drawing.current) { drawing.current = false; saveAnnotation(); } };

  const drawMarkerLine = () => {
    const dc = drawCanvasRef.current;
    const vp = viewportRef.current;
    if (!dc || !vp) return;
    const vpRect = vp.getBoundingClientRect();
    const markerClientY = vpRect.top + markerY * vpRect.height;
    const dcRect = dc.getBoundingClientRect();
    const canvasY = (markerClientY - dcRect.top) * (dc.height / dcRect.height);
    if (canvasY < 0 || canvasY > dc.height) return;
    pushHistory();
    const ctx = dc.getContext("2d");
    ctx.beginPath();
    ctx.moveTo(0, canvasY);
    ctx.lineTo(dc.width, canvasY);
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.lineCap = "round";
    ctx.globalCompositeOperation = "source-over";
    ctx.stroke();
    saveAnnotation();
  };

  const startMarkerDrag = (e) => {
    e.stopPropagation(); e.preventDefault();
    let dragging = true;
    const move = (ev) => {
      if (!dragging) return;
      ev.preventDefault();
      const vp = viewportRef.current;
      if (!vp) return;
      const rect = vp.getBoundingClientRect();
      const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
      setMarkerY(Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)));
    };
    const up = () => {
      dragging = false;
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("touchend", up);
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", move, { passive: false });
    window.addEventListener("touchend", up);
  };

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      const url = await uploadChart(token, projectId, file);
      const updated = [...charts, { url, name: file.name, annotation: null }];
      onChartsChange(updated); setActiveIdx(updated.length - 1);
    } catch(err) { alert("アップロードに失敗しました: " + err.message); }
    setUploading(false); e.target.value = "";
  };

  const handleDelete = async () => {
    if (!window.confirm("この編み図を削除しますか？")) return;
    await deleteChart(token, activeChart.url);
    const updated = charts.filter((_, i) => i !== activeIdx);
    onChartsChange(updated);
    setActiveIdx(Math.max(0, activeIdx - 1));
  };

  const isPdf = activeChart?.url?.toLowerCase().includes(".pdf");
  const COLORS = ["#C4837A","#2D4A3E","#B8924A","#4488ff","#000000","#ffffff"];
  const markerHeightPx = [3, 6, 12, 20, 30][markerHeight - 1];

  return (
    <div style={{ position:"fixed", inset:0, background:"#1a1a1a", zIndex:200, display:"flex", flexDirection:"column" }}>
      <div style={{ background:"#2D4A3E", padding:"10px 14px", display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
        <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#F5EEDD", fontSize:22, cursor:"pointer", padding:"0 4px" }}>←</button>
        <span style={{ color:"#F5EEDD", fontSize:14, fontWeight:"bold", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
          {activeChart?.name || "編み図"}
        </span>
        {scale !== 1 && (
          <button onClick={() => { setScale(1); setOffset({x:0,y:0}); }} style={{ background:"rgba(245,238,221,0.15)", border:"1px solid rgba(245,238,221,0.3)", color:"#F5EEDD", borderRadius:8, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"sans-serif" }}>リセット</button>
        )}
        <button onClick={() => fileInputRef.current?.click()} style={{ background:"#B8924A", border:"none", color:"#2D4A3E", borderRadius:8, padding:"6px 12px", fontSize:13, fontWeight:"bold", cursor:"pointer", fontFamily:"sans-serif" }}>
          {uploading ? "…" : "＋"}
        </button>
        <input ref={fileInputRef} type="file" accept="image/*,application/pdf" style={{ display:"none" }} onChange={handleUpload} />
      </div>

      {charts.length > 1 && (
        <div style={{ background:"#243d33", padding:"5px 14px", display:"flex", gap:6, overflowX:"auto", flexShrink:0 }}>
          {charts.map((c, i) => (
            <button key={i} onClick={() => setActiveIdx(i)} style={{
              background: i===activeIdx ? "#B8924A" : "transparent",
              border: `1px solid ${i===activeIdx ? "#B8924A" : "rgba(245,238,221,0.3)"}`,
              color: i===activeIdx ? "#2D4A3E" : "rgba(245,238,221,0.7)",
              borderRadius:14, padding:"3px 10px", fontSize:12, cursor:"pointer",
              fontFamily:"sans-serif", whiteSpace:"nowrap", fontWeight: i===activeIdx ? "bold" : "normal"
            }}>{c.name || `編み図 ${i+1}`}</button>
          ))}
        </div>
      )}

      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
        <div ref={viewportRef} style={{ flex:1, overflow:"hidden", position:"relative", background:"#111", touchAction:"none" }}
          onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
          onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        >
          {charts.length === 0 ? (
            <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", color:"rgba(245,238,221,0.5)", fontFamily:"sans-serif", padding:32 }}>
              <div style={{ fontSize:48, marginBottom:12 }}>📄</div>
              <div style={{ marginBottom:8 }}>編み図がまだありません</div>
              <button onClick={() => fileInputRef.current?.click()} style={{ background:"#B8924A", border:"none", color:"#2D4A3E", borderRadius:8, padding:"10px 20px", fontSize:15, fontWeight:"bold", cursor:"pointer", fontFamily:"sans-serif", marginTop:8 }}>＋ 追加</button>
            </div>
          ) : isPdf ? (
            <iframe src={activeChart.url} style={{ width:"100%", height:"100%", border:"none" }} />
          ) : (
            <div style={{ transform:`translate(${offset.x}px,${offset.y}px) scale(${scale})`, transformOrigin:"center center", width:"100%", height:"100%", display:"flex", alignItems:"flex-start", justifyContent:"center" }}>
              <div style={{ position:"relative", display:"inline-block" }}>
                <canvas ref={bgCanvasRef} style={{ display:"block", maxWidth:"100%" }} />
                <canvas ref={drawCanvasRef} style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", cursor: tool==="eraser"||tool==="pen" ? "crosshair" : "grab" }} />
              </div>
            </div>
          )}

          {showMarker && !isPdf && charts.length > 0 && (
            <div style={{ position:"absolute", left:0, right:0, top:`${markerY*100}%`, zIndex:20, pointerEvents:"none", transform:"translateY(-50%)" }}>
              <div style={{ position:"absolute", left:0, right:0, top:`-${markerHeightPx/2}px`, height:`${markerHeightPx}px`, background:"rgba(184,146,74,0.3)", borderTop:"1.5px solid rgba(184,146,74,0.9)", borderBottom:"1.5px solid rgba(184,146,74,0.9)" }} />
              <div
                style={{ position:"absolute", right:0, top:-18, width:36, height:36, background:"#B8924A", borderRadius:"50% 0 0 50%", display:"flex", alignItems:"center", justifyContent:"center", cursor:"grab", pointerEvents:"auto", boxShadow:"-2px 0 8px rgba(0,0,0,0.4)", touchAction:"none" }}
                onMouseDown={startMarkerDrag} onTouchStart={startMarkerDrag}
              >
                <span style={{ color:"#fff", fontSize:16, userSelect:"none" }}>⇕</span>
              </div>
            </div>
          )}

          {toast && (
            <div style={{ position:"absolute", top:16, left:"50%", transform:"translateX(-50%)", zIndex:40, background:"rgba(45,74,62,0.95)", color:"#F5EEDD", borderRadius:12, padding:"10px 20px", fontSize:14, fontFamily:"sans-serif", whiteSpace:"nowrap", boxShadow:"0 4px 16px rgba(0,0,0,0.4)", pointerEvents:"none" }}>
              {toast}
            </div>
          )}

          {section && onCount && (
            <div style={{ position:"absolute", bottom:16, left:"50%", transform:"translateX(-50%)", zIndex:30, display:"flex", alignItems:"center", gap:0, background:"rgba(45,74,62,0.92)", borderRadius:16, boxShadow:"0 4px 20px rgba(0,0,0,0.5)", overflow:"hidden", backdropFilter:"blur(8px)" }}>
              <div style={{ padding:"10px 16px", borderRight:"1px solid rgba(245,238,221,0.15)" }}>
                <div style={{ color:"rgba(245,238,221,0.6)", fontSize:10, fontFamily:"sans-serif", marginBottom:2 }}>{section.name}</div>
                <div style={{ color:"#F5EEDD", fontSize:22, fontWeight:"bold", lineHeight:1 }}>{section.rows}<span style={{ fontSize:12, marginLeft:4, opacity:0.7 }}>段</span></div>
              </div>
              <button onClick={() => onCount(-1)} style={{ background:"transparent", border:"none", color:"#F0D9D6", fontSize:24, padding:"0 18px", height:60, cursor:"pointer", borderRight:"1px solid rgba(245,238,221,0.15)" }}>−</button>
              <button onClick={() => onCount(1)} style={{ background:"transparent", border:"none", color:"#F5EEDD", fontSize:24, fontWeight:"bold", padding:"0 22px", height:60, cursor:"pointer" }}>＋</button>
            </div>
          )}
        </div>

        {!isPdf && charts.length > 0 && (
          <div style={{ width:52, background:"#2D4A3E", display:"flex", flexDirection:"column", alignItems:"center", padding:"10px 0", gap:10, flexShrink:0, overflowY:"auto" }}>
            {[[null,"👁","閲覧"],["pen","✏️","ペン"],["eraser","🧹","消しゴム"]].map(([t, icon, label]) => (
              <button key={String(t)} onClick={() => setTool(t)} title={label} style={{
                background: tool===t ? "#B8924A" : "transparent",
                border: `1px solid ${tool===t ? "#B8924A" : "rgba(245,238,221,0.3)"}`,
                borderRadius:10, width:42, height:42, fontSize:20, cursor:"pointer",
                display:"flex", alignItems:"center", justifyContent:"center",
              }}>{icon}</button>
            ))}
            <button onClick={undo} title="1つ戻す" style={{ background:"transparent", border:"1px solid rgba(245,238,221,0.3)", borderRadius:10, width:42, height:42, fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>↩️</button>
            <div style={{ width:32, height:1, background:"rgba(245,238,221,0.2)" }} />
            <button onClick={() => setShowMarker(m => !m)} title="段マーカー" style={{ background: showMarker ? "rgba(184,146,74,0.3)" : "transparent", border: `1px solid ${showMarker ? "#B8924A" : "rgba(245,238,221,0.3)"}`, borderRadius:10, width:42, height:42, fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>📍</button>
            {showMarker && (
              <button onClick={drawMarkerLine} title="ラインに沿って線を引く" style={{ background:"rgba(184,146,74,0.2)", border:"1px solid #B8924A", borderRadius:10, width:42, height:42, fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:1 }}>
                <span style={{ fontSize:13 }}>✏️</span>
                <span style={{ fontSize:9, color:"#B8924A", fontFamily:"sans-serif", lineHeight:1 }}>引く</span>
              </button>
            )}
            {showMarker && <>
              <div style={{ width:32, height:1, background:"rgba(245,238,221,0.2)" }} />
              {[1,2,3,4,5].map(h => (
                <button key={h} onClick={() => setMarkerHeight(h)} style={{ background: markerHeight===h ? "rgba(184,146,74,0.4)" : "transparent", border: `1px solid ${markerHeight===h ? "#B8924A" : "rgba(245,238,221,0.2)"}`, borderRadius:6, width:42, height:22, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <div style={{ width:28, height:[2,3,5,8,11][h-1], background:"rgba(184,146,74,0.8)", borderRadius:2 }} />
                </button>
              ))}
            </>}
            <div style={{ width:32, height:1, background:"rgba(245,238,221,0.2)" }} />
            {COLORS.map(cl => (
              <button key={cl} onClick={() => { setColor(cl); setTool("pen"); }} style={{ width:26, height:26, borderRadius:"50%", background:cl, border: color===cl && tool==="pen" ? "3px solid #F5EEDD" : "2px solid rgba(255,255,255,0.2)", cursor:"pointer", flexShrink:0 }} />
            ))}
            <div style={{ width:32, height:1, background:"rgba(245,238,221,0.2)" }} />
            {[2,4,8].map(w => (
              <button key={w} onClick={() => setLineWidth(w)} style={{ background: lineWidth===w ? "#B8924A" : "transparent", border: `1px solid ${lineWidth===w ? "#B8924A" : "rgba(245,238,221,0.3)"}`, borderRadius:8, width:42, height:26, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <div style={{ width:24, height:w===2?1:w===4?3:5, background:"#F5EEDD", borderRadius:3 }} />
              </button>
            ))}
            <div style={{ width:32, height:1, background:"rgba(245,238,221,0.2)" }} />
            <button onClick={handleDelete} title="削除" style={{ background:"transparent", border:"1px solid rgba(244,164,164,0.3)", color:"#f4a4a4", borderRadius:10, width:42, height:42, fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>🗑️</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Small components ──────────────────────────────────────────────────────────

const Tag = ({ children }) => (
  <span style={{ fontSize:11, background:C.goldPale, color:C.gold, border:`1px solid ${C.gold}`, borderRadius:4, padding:"2px 7px", fontFamily:"sans-serif" }}>{children}</span>
);

const GhostBtn = ({ onClick, children, style = {} }) => (
  <button onClick={onClick} style={{ background:"transparent", border:`1px solid ${C.border}`, color:C.textMid, borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"sans-serif", ...style }}>{children}</button>
);

const FieldLabel = ({ children }) => (
  <label style={{ display:"block", fontSize:11, color:C.gold, letterSpacing:"0.1em", fontFamily:"sans-serif", textTransform:"uppercase", marginBottom:6, marginTop:16 }}>{children}</label>
);

const ProgressBar = ({ pct }) => (
  <div style={{ background:C.border, borderRadius:4, height:6, overflow:"hidden" }}>
    <div style={{ background:`linear-gradient(90deg,${C.green},${C.gold})`, height:"100%", borderRadius:4, width:`${pct}%`, transition:"width 0.3s ease" }} />
  </div>
);

// ── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  const [projects, setProjects] = useState([]);
  const [activeProjectId, setActiveProjectId] = useState(null);
  const [view, setView] = useState("counter");
  const [editProjectDraft, setEditProjectDraft] = useState(null);
  const [editSectionDraft, setEditSectionDraft] = useState(null);
  const [tapFeedback, setTapFeedback] = useState(false);
  const [syncStatus, setSyncStatus] = useState("loading");
  const [showCharts, setShowCharts] = useState(false);

  // 起動時：セッション復元
  useEffect(() => {
    (async () => {
      const saved = loadSession();
      if (!saved) { setAuthLoading(false); return; }

      // トークンの有効期限確認（expiry があれば）
      try {
        const refreshed = await authRefresh(saved.refresh_token);
        if (refreshed.access_token) {
          const newSession = { access_token: refreshed.access_token, refresh_token: refreshed.refresh_token, user: refreshed.user };
          saveSession(newSession);
          setSession(newSession);
        } else {
          clearSession();
        }
      } catch {
        clearSession();
      }
      setAuthLoading(false);
    })();
  }, []);

  // ログイン後：データ読み込み
  useEffect(() => {
    if (!session) return;
    (async () => {
      setSyncStatus("loading");
      let data = await loadFromSupabase(session.access_token, session.user.id);
      if (data && data.projects && data.projects.length > 0) {
        setProjects(data.projects);
        setActiveProjectId(data.activeProjectId || data.projects[0].id);
      } else {
        const p = initProject();
        setProjects([p]);
        setActiveProjectId(p.id);
      }
      setSyncStatus("ok");
    })();
  }, [session?.user?.id]);

  // データ変更時にSupabaseへ保存
  const saveRef = useRef(null);
  useEffect(() => {
    if (!session || projects.length === 0 || syncStatus === "loading") return;
    if (saveRef.current) clearTimeout(saveRef.current);
    saveRef.current = setTimeout(async () => {
      try {
        await saveToSupabase(session.access_token, session.user.id, projects, activeProjectId);
        setSyncStatus("ok");
      } catch {
        setSyncStatus("error");
      }
    }, 800);
  }, [projects, activeProjectId]);

  const handleSignOut = async () => {
    if (!window.confirm("ログアウトしますか？")) return;
    await authSignOut(session.access_token);
    clearSession();
    setSession(null);
    setProjects([]);
    setSyncStatus("loading");
  };

  // 起動中
  if (authLoading) {
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
        <div style={{ fontSize:40 }}>🧶</div>
        <div style={{ fontSize:14, color:C.textLight, fontFamily:"sans-serif" }}>読み込み中…</div>
      </div>
    );
  }

  // 未ログイン
  if (!session) {
    return <AuthScreen onAuth={(s) => setSession(s)} />;
  }

  const activeProject = projects.find(p => p.id === activeProjectId);
  const activeSection = activeProject?.sections?.find(s => s.id === activeProject.activeSectionId);

  const updateProjects = fn => setProjects(ps => fn(ps));
  const updateActiveProject = fn => updateProjects(ps => ps.map(p => p.id === activeProjectId ? fn(p) : p));
  const updateActiveSection = fn => updateActiveProject(p => ({ ...p, sections: p.sections.map(s => s.id === p.activeSectionId ? fn(s) : s) }));

  const increment = () => {
    updateActiveSection(s => ({ ...s, rows: s.rows + 1 }));
    setTapFeedback(true);
    setTimeout(() => setTapFeedback(false), 150);
  };
  const decrement = () => updateActiveSection(s => ({ ...s, rows: Math.max(0, s.rows - 1) }));
  const resetSection = () => { if (window.confirm("この工程の段数を0にリセットしますか？")) updateActiveSection(s => ({ ...s, rows: 0 })); };
  const toggleDone = id => updateActiveProject(p => ({ ...p, sections: p.sections.map(s => s.id === id ? { ...s, done: !s.done } : s) }));
  const switchSection = id => updateActiveProject(p => ({ ...p, activeSectionId: id }));
  const addSection = () => {
    const s = newSection(`工程 ${(activeProject?.sections?.length || 0) + 1}`);
    updateActiveProject(p => ({ ...p, sections: [...p.sections, s], activeSectionId: s.id }));
  };
  const moveSectionUp = id => {
    updateActiveProject(p => {
      const idx = p.sections.findIndex(s => s.id === id);
      if (idx <= 0) return p;
      const next = [...p.sections];
      [next[idx-1], next[idx]] = [next[idx], next[idx-1]];
      return { ...p, sections: next };
    });
  };
  const moveSectionDown = id => {
    updateActiveProject(p => {
      const idx = p.sections.findIndex(s => s.id === id);
      if (idx < 0 || idx >= p.sections.length - 1) return p;
      const next = [...p.sections];
      [next[idx], next[idx+1]] = [next[idx+1], next[idx]];
      return { ...p, sections: next };
    });
  };
  const deleteSection = id => {
    if (!window.confirm("この工程を削除しますか？")) return;
    updateActiveProject(p => {
      const next = p.sections.filter(s => s.id !== id);
      if (next.length === 0) { const s = newSection("工程 1"); return { ...p, sections: [s], activeSectionId: s.id }; }
      const newActive = p.activeSectionId === id ? next[0].id : p.activeSectionId;
      return { ...p, sections: next, activeSectionId: newActive };
    });
  };
  const addProject = () => {
    const p = initProject();
    setProjects(ps => [...ps, p]);
    setActiveProjectId(p.id);
    setEditProjectDraft({ ...p });
    setView("editProject");
  };
  const deleteProject = id => {
    if (!window.confirm("このプロジェクトを削除しますか？")) return;
    setProjects(ps => {
      let next = ps.filter(p => p.id !== id);
      if (next.length === 0) { const p = initProject(); next = [p]; setActiveProjectId(p.id); }
      else if (id === activeProjectId) setActiveProjectId(next[next.length - 1].id);
      return next;
    });
    setView("counter");
  };

  const sectionPct = s => s.targetRows ? Math.min(100, Math.round(s.rows / parseInt(s.targetRows) * 100)) : null;
  const projectTotalRows = p => p.sections.reduce((a, s) => a + s.rows, 0);
  const projectTotalTarget = p => {
    const ts = p.sections.filter(s => s.targetRows).map(s => parseInt(s.targetRows));
    return ts.length === p.sections.length ? ts.reduce((a,b)=>a+b,0) : null;
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>

      {showCharts && activeProject && (
        <ChartViewer
          charts={activeProject.charts || []}
          projectId={activeProject.id}
          token={session.access_token}
          onClose={() => setShowCharts(false)}
          onChartsChange={charts => updateActiveProject(p => ({ ...p, charts }))}
          section={activeSection}
          onCount={delta => {
            if (delta <= 0) { updateActiveSection(s => ({ ...s, rows: Math.max(0, s.rows + delta) })); return; }
            updateActiveProject(p => {
              const sIdx = p.sections.findIndex(s => s.id === p.activeSectionId);
              const s = p.sections[sIdx];
              const newRows = s.rows + 1;
              const target = s.targetRows ? parseInt(s.targetRows) : null;
              const reached = target && newRows >= target;
              const nextSection = reached ? p.sections.slice(sIdx + 1).find(ns => !ns.done) : null;
              return {
                ...p,
                activeSectionId: nextSection ? nextSection.id : p.activeSectionId,
                sections: p.sections.map((s2, i) => {
                  if (i === sIdx) return { ...s2, rows: newRows, done: reached ? true : s2.done };
                  return s2;
                }),
              };
            });
          }}
        />
      )}

      {/* Header */}
      <header style={{ background:C.green, padding:"12px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ color:"#F5EEDD", fontSize:18, fontWeight:"bold", letterSpacing:"0.03em" }}>🧶 Knitting Journal</div>
          <div style={{ fontSize:10, fontFamily:"sans-serif", color: syncStatus==="ok" ? "#a8d5b5" : syncStatus==="error" ? "#f4a4a4" : "#ccccaa" }}>
            {syncStatus==="loading" ? "読込中…" : syncStatus==="ok" ? "✓" : "⚠ 同期エラー"}
          </div>
        </div>
        <nav style={{ display:"flex", gap:6, alignItems:"center" }}>
          {[["counter","カウンター"],["projects","プロジェクト"]].map(([v,label]) => (
            <button key={v} onClick={() => setView(v)} style={{
              background: view===v ? C.gold : "transparent",
              border: view===v ? `1px solid ${C.gold}` : "1px solid rgba(245,238,221,0.3)",
              color: view===v ? C.green : "rgba(245,238,221,0.7)",
              borderRadius:20, padding:"5px 14px", fontSize:13,
              fontWeight: view===v ? "bold" : "normal",
              cursor:"pointer", fontFamily:"sans-serif"
            }}>{label}</button>
          ))}
          <button onClick={handleSignOut} title="ログアウト" style={{ background:"transparent", border:"1px solid rgba(245,238,221,0.3)", color:"rgba(245,238,221,0.6)", borderRadius:20, padding:"5px 10px", fontSize:12, cursor:"pointer", fontFamily:"sans-serif" }}>
            ⏏
          </button>
        </nav>
      </header>

      <main style={{ maxWidth:480, margin:"0 auto", padding:"16px 14px 60px" }}>
        <div id="__sync" style={{ fontFamily:"sans-serif", fontSize:11, color:C.textLight, textAlign:"center", marginBottom:8 }}></div>

        {syncStatus === "loading" && (
          <div style={{ textAlign:"center", padding:"60px 0", color:C.textLight, fontFamily:"sans-serif" }}>
            <div style={{ fontSize:32, marginBottom:12 }}>🧶</div>
            <div>データを読み込み中…</div>
          </div>
        )}

        {syncStatus !== "loading" && (<>

        {/* ── COUNTER ── */}
        {view === "counter" && activeProject && (<>
          <div style={{ background:C.card, borderRadius:12, border:`1px solid ${C.border}`, padding:"18px 16px", marginBottom:12, boxShadow:"0 2px 12px rgba(45,74,62,0.06)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <Tag>{activeProject.type}</Tag>
              <span style={{ flex:1, fontSize:16, fontWeight:"bold", color:C.green }}>{activeProject.name}</span>
              <button onClick={() => setShowCharts(true)} style={{ background:C.goldPale, border:`1px solid ${C.gold}`, color:C.gold, borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"sans-serif" }}>📄 編み図</button>
              <GhostBtn onClick={() => { setEditProjectDraft({...activeProject}); setView("editProject"); }}>編集</GhostBtn>
            </div>
            {(() => {
              const total = projectTotalRows(activeProject);
              const target = projectTotalTarget(activeProject);
              const pct = target ? Math.min(100, Math.round(total/target*100)) : null;
              const done = activeProject.sections.filter(s=>s.done).length;
              return (
                <div>
                  <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:6, flexWrap:"wrap" }}>
                    <span style={{ fontSize:15, fontWeight:"bold" }}>合計 {total}段</span>
                    {target && <span style={{ fontSize:13, color:C.gold, fontFamily:"sans-serif" }}>{pct}%</span>}
                    <span style={{ fontSize:12, color:C.textLight, fontFamily:"sans-serif", marginLeft:"auto" }}>{done}/{activeProject.sections.length} 工程完了</span>
                  </div>
                  {target && <ProgressBar pct={pct} />}
                </div>
              );
            })()}
          </div>

          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:12 }}>
            {activeProject.sections.map(s => (
              <button key={s.id} onClick={() => switchSection(s.id)} style={{
                background: s.id===activeProject.activeSectionId ? C.green : C.card,
                border: s.id===activeProject.activeSectionId ? `1px solid ${C.green}` : `1px solid ${C.border}`,
                color: s.id===activeProject.activeSectionId ? "#F5EEDD" : C.textMid,
                borderRadius:20, padding:"6px 14px", fontSize:13, cursor:"pointer",
                fontFamily:"sans-serif", fontWeight: s.id===activeProject.activeSectionId ? "bold" : "normal",
                opacity: s.done ? 0.5 : 1, textDecoration: s.done ? "line-through" : "none",
              }}>{s.done ? "✓ " : ""}{s.name}</button>
            ))}
            <button onClick={addSection} style={{ background:"transparent", border:`1px dashed ${C.border}`, color:C.textLight, borderRadius:20, padding:"6px 12px", fontSize:16, cursor:"pointer" }}>＋</button>
          </div>

          {activeSection && (
            <div style={{ background:C.card, borderRadius:12, border:`1px solid ${C.border}`, padding:"18px 16px", boxShadow:"0 2px 12px rgba(45,74,62,0.06)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
                <span style={{ fontSize:17, fontWeight:"bold", color:C.green, flex:1 }}>{activeSection.name}</span>
                <GhostBtn onClick={() => { setEditSectionDraft({...activeSection}); setView("editSection"); }}>編集</GhostBtn>
                <button onClick={() => toggleDone(activeSection.id)} style={{ background: activeSection.done ? C.green : "transparent", border: activeSection.done ? `1px solid ${C.green}` : `1px solid ${C.border}`, color: activeSection.done ? "#F5EEDD" : C.textLight, borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"sans-serif" }}>{activeSection.done ? "✓ 完了" : "完了にする"}</button>
              </div>

              <div style={{ textAlign:"center", padding:"20px 0 16px" }}>
                <div style={{ fontSize:92, fontWeight:"bold", color: tapFeedback ? C.rose : C.green, lineHeight:1, transition:"color 0.1s, transform 0.1s", transform: tapFeedback ? "scale(1.06)" : "scale(1)" }}>
                  {activeSection.rows}
                </div>
                <div style={{ fontSize:18, color:C.textMid, marginTop:4, letterSpacing:"0.1em" }}>段目</div>
                {sectionPct(activeSection) !== null && (
                  <div style={{ marginTop:12 }}>
                    <ProgressBar pct={sectionPct(activeSection)} />
                    <div style={{ fontSize:12, color:C.textLight, marginTop:5, fontFamily:"sans-serif" }}>{sectionPct(activeSection)}% / 目標 {activeSection.targetRows}段</div>
                  </div>
                )}
              </div>

              <div style={{ display:"flex", gap:12, marginBottom:10 }}>
                <button onClick={decrement} style={{ flex:1, background:C.rosePale, color:C.rose, border:`1px solid ${C.rose}`, borderRadius:10, padding:"22px 0", fontSize:26, cursor:"pointer" }}>−</button>
                <button onClick={increment} style={{ flex:3, background:C.green, color:"#F5EEDD", border:"none", borderRadius:10, padding:"22px 0", fontSize:22, fontWeight:"bold", cursor:"pointer", boxShadow:"0 4px 12px rgba(45,74,62,0.25)" }}>＋ 1段</button>
              </div>
              <button onClick={resetSection} style={{ width:"100%", background:"transparent", border:`1px solid ${C.border}`, color:C.textLight, borderRadius:8, padding:9, fontSize:13, cursor:"pointer", fontFamily:"sans-serif", marginBottom:12 }}>リセット</button>

              {activeSection.memo && (
                <div style={{ background:C.goldPale, borderRadius:8, padding:"12px 14px", borderLeft:`3px solid ${C.gold}`, marginTop:8 }}>
                  <div style={{ fontSize:10, color:C.gold, fontFamily:"sans-serif", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:4 }}>メモ</div>
                  <div style={{ fontSize:14, color:C.textMid, lineHeight:1.6, whiteSpace:"pre-wrap" }}>{activeSection.memo}</div>
                </div>
              )}

              <button onClick={() => deleteSection(activeSection.id)} style={{ marginTop:14, background:"transparent", border:"none", color:C.rose, fontSize:12, cursor:"pointer", fontFamily:"sans-serif", textDecoration:"underline" }}>この工程を削除</button>
            </div>
          )}

          {projects.length > 1 && (
            <div style={{ marginTop:16, borderTop:`1px solid ${C.border}`, paddingTop:14 }}>
              <div style={{ fontSize:11, color:C.textLight, fontFamily:"sans-serif", marginBottom:8 }}>プロジェクトを切り替え</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {projects.map(p => (
                  <button key={p.id} onClick={() => setActiveProjectId(p.id)} style={{ background: p.id===activeProjectId ? C.green : "white", border: p.id===activeProjectId ? `1px solid ${C.green}` : `1px solid ${C.border}`, color: p.id===activeProjectId ? "#F5EEDD" : C.textMid, borderRadius:20, padding:"5px 14px", fontSize:13, cursor:"pointer", fontFamily:"sans-serif" }}>{p.name}</button>
                ))}
              </div>
            </div>
          )}
        </>)}

        {/* ── PROJECTS ── */}
        {view === "projects" && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <h2 style={{ fontSize:20, color:C.green }}>プロジェクト</h2>
              <button onClick={addProject} style={{ background:C.green, color:"#F5EEDD", border:"none", borderRadius:8, padding:"8px 16px", fontSize:14, cursor:"pointer", fontFamily:"sans-serif" }}>＋ 新規</button>
            </div>
            {projects.map(p => {
              const total = projectTotalRows(p);
              const target = projectTotalTarget(p);
              const pct = target ? Math.min(100, Math.round(total/target*100)) : null;
              const done = p.sections.filter(s=>s.done).length;
              return (
                <div key={p.id} style={{ background:C.card, border:`1px solid ${p.id===activeProjectId ? C.green : C.border}`, borderRadius:10, padding:"14px 16px", marginBottom:10, boxShadow: p.id===activeProjectId ? `0 0 0 2px ${C.green}22` : "none" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <Tag>{p.type}</Tag>
                    <span style={{ flex:1, fontSize:15, fontWeight:"bold", color:C.green }}>{p.name}</span>
                    <span style={{ fontSize:11, color:C.textLight, fontFamily:"sans-serif" }}>{p.createdAt}</span>
                  </div>
                  <div style={{ display:"flex", alignItems:"baseline", gap:6, marginBottom:4 }}>
                    <span style={{ fontSize:24, fontWeight:"bold" }}>{total}段</span>
                    {target && <span style={{ fontSize:13, color:C.textMid, fontFamily:"sans-serif" }}>/ {target}段 ({pct}%)</span>}
                    <span style={{ fontSize:12, color:C.textLight, fontFamily:"sans-serif", marginLeft:"auto" }}>{done}/{p.sections.length}工程</span>
                  </div>
                  {target && <div style={{ margin:"8px 0" }}><ProgressBar pct={pct} /></div>}
                  <div style={{ display:"flex", gap:8, marginTop:10 }}>
                    <button onClick={() => { setActiveProjectId(p.id); setView("counter"); }} style={{ flex:1, background:C.green, color:"#F5EEDD", border:"none", borderRadius:6, padding:"7px 0", fontSize:13, cursor:"pointer", fontFamily:"sans-serif" }}>{p.id===activeProjectId ? "✓ 選択中" : "選択"}</button>
                    <button onClick={() => deleteProject(p.id)} style={{ background:"transparent", border:`1px solid ${C.border}`, color:C.rose, borderRadius:6, padding:"7px 14px", fontSize:13, cursor:"pointer", fontFamily:"sans-serif" }}>削除</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── EDIT PROJECT ── */}
        {view === "editProject" && editProjectDraft && (
          <div style={{ background:C.card, borderRadius:12, border:`1px solid ${C.border}`, padding:"18px 16px" }}>
            <h2 style={{ fontSize:20, color:C.green, marginBottom:4 }}>プロジェクトを編集</h2>
            <FieldLabel>プロジェクト名</FieldLabel>
            <input style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px", fontSize:15, color:C.text, boxSizing:"border-box" }} value={editProjectDraft.name} onChange={e => setEditProjectDraft({...editProjectDraft, name:e.target.value})} />
            <FieldLabel>種類</FieldLabel>
            <div style={{ display:"flex", gap:8, marginTop:2 }}>
              {["棒針","かぎ針","その他"].map(t => (
                <button key={t} onClick={() => setEditProjectDraft({...editProjectDraft, type:t})} style={{ flex:1, background: editProjectDraft.type===t ? C.green : C.bg, border: editProjectDraft.type===t ? `1px solid ${C.green}` : `1px solid ${C.border}`, color: editProjectDraft.type===t ? "#F5EEDD" : C.textMid, borderRadius:8, padding:"9px 0", fontSize:14, cursor:"pointer", fontFamily:"sans-serif" }}>{t}</button>
              ))}
            </div>
            <FieldLabel>メモ</FieldLabel>
            <textarea style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px", fontSize:14, color:C.text, boxSizing:"border-box", minHeight:90, resize:"vertical" }} placeholder="使用糸、針のサイズなど" value={editProjectDraft.memo} onChange={e => setEditProjectDraft({...editProjectDraft, memo:e.target.value})} />
            <div style={{ display:"flex", gap:10, marginTop:24 }}>
              <GhostBtn onClick={() => setView("counter")} style={{ flex:1, padding:"12px 0", fontSize:15 }}>キャンセル</GhostBtn>
              <button onClick={() => { updateProjects(ps => ps.map(p => p.id===editProjectDraft.id ? {...p, ...editProjectDraft} : p)); setView("counter"); }} style={{ flex:2, background:C.green, border:"none", color:"#F5EEDD", borderRadius:8, padding:"12px 0", fontSize:15, fontWeight:"bold", cursor:"pointer", fontFamily:"sans-serif" }}>保存</button>
            </div>
          </div>
        )}

        {/* ── EDIT SECTION ── */}
        {view === "editSection" && editSectionDraft && (
          <div style={{ background:C.card, borderRadius:12, border:`1px solid ${C.border}`, padding:"18px 16px" }}>
            <h2 style={{ fontSize:20, color:C.green, marginBottom:4 }}>工程を編集</h2>
            <FieldLabel>工程名</FieldLabel>
            <input style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px", fontSize:15, color:C.text, boxSizing:"border-box" }} value={editSectionDraft.name} onChange={e => setEditSectionDraft({...editSectionDraft, name:e.target.value})} />
            <FieldLabel>目標段数（省略可）</FieldLabel>
            <input type="number" style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px", fontSize:15, color:C.text, boxSizing:"border-box" }} placeholder="例: 40" value={editSectionDraft.targetRows} onChange={e => setEditSectionDraft({...editSectionDraft, targetRows:e.target.value})} />
            <FieldLabel>メモ</FieldLabel>
            <textarea style={{ width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px", fontSize:14, color:C.text, boxSizing:"border-box", minHeight:90, resize:"vertical" }} placeholder="この工程のメモ・パターンなど" value={editSectionDraft.memo} onChange={e => setEditSectionDraft({...editSectionDraft, memo:e.target.value})} />
            <FieldLabel>工程の順番</FieldLabel>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={() => moveSectionUp(editSectionDraft.id)} style={{ flex:1, background:C.bg, border:`1px solid ${C.border}`, color:C.textMid, borderRadius:8, padding:"10px 0", fontSize:18, cursor:"pointer" }}>↑ 前へ</button>
              <button onClick={() => moveSectionDown(editSectionDraft.id)} style={{ flex:1, background:C.bg, border:`1px solid ${C.border}`, color:C.textMid, borderRadius:8, padding:"10px 0", fontSize:18, cursor:"pointer" }}>↓ 後へ</button>
            </div>
            <div style={{ fontSize:11, color:C.textLight, fontFamily:"sans-serif", marginTop:6 }}>
              {activeProject?.sections && (() => { const idx = activeProject.sections.findIndex(s => s.id === editSectionDraft.id); return idx >= 0 ? `現在の位置: ${idx+1} / ${activeProject.sections.length}` : ""; })()}
            </div>
            <div style={{ display:"flex", gap:10, marginTop:24 }}>
              <GhostBtn onClick={() => setView("counter")} style={{ flex:1, padding:"12px 0", fontSize:15 }}>キャンセル</GhostBtn>
              <button onClick={() => { updateActiveProject(p => ({ ...p, sections: p.sections.map(s => s.id===editSectionDraft.id ? {...s, ...editSectionDraft} : s) })); setView("counter"); }} style={{ flex:2, background:C.green, border:"none", color:"#F5EEDD", borderRadius:8, padding:"12px 0", fontSize:15, fontWeight:"bold", cursor:"pointer", fontFamily:"sans-serif" }}>保存</button>
            </div>
          </div>
        )}
        </>)}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          const banner = document.createElement('div');
          banner.innerHTML = `
            <div style="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
              background:#2D4A3E;color:#F5EEDD;border-radius:12px;padding:12px 20px;
              display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,0.25);
              font-family:sans-serif;font-size:14px;z-index:9999;max-width:320px;width:90%;">
              <span>🧶 アップデートがあります</span>
              <button onclick="
                navigator.serviceWorker.controller.postMessage('skipWaiting');
                window.location.reload();
              " style="background:#B8924A;color:#2D4A3E;border:none;border-radius:8px;
                padding:6px 14px;font-weight:bold;cursor:pointer;font-size:13px;white-space:nowrap;">
                更新する
              </button>
            </div>
          `;
          document.body.appendChild(banner);
        }
      });
    });
  });
}
</script>
</body>
</html>
